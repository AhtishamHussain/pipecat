name: notify-devops

# Minimal notify workflow: on push to main (or manual run) it signals the
# personal GitOps repo (AhtishamHussain/devops) to run the real build/deploy.
# All build/deploy work lives in the devops repo; this only fires the signal.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-devops:
    name: Notify devops repo
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to devops
        env:
          DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
          DEVOPS_REPO: AhtishamHussain/devops
        run: |
          set -euo pipefail
          status="$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DEVOPS_REPO}/dispatches" \
            -d '{"event_type":"pipecat-green","client_payload":{"sha":"${{ github.sha }}"}}')"

          echo "GitHub API responded with HTTP ${status}."
          if [ "${status}" != "204" ]; then
            echo "::error::Dispatch to ${DEVOPS_REPO} failed (HTTP ${status}). " \
                 "Check the DISPATCH_TOKEN secret (classic PAT, 'repo' scope)."
            exit 1
          fi
          echo "Notified ${DEVOPS_REPO}."
