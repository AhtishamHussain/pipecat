name: notify-devops

# Minimal notify workflow: on push to main (or manual run) it signals the
# personal GitOps repo (AhtishamHussain/devops) to run the real build/deploy.
# All build/deploy work lives in the devops repo; this only fires the signal.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-devops:
    name: Notify devops repo
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to devops
        env:
          PROJECT_REPO_TOKEN: ${{ secrets.PROJECT_REPO_TOKEN }}
          DEVOPS_REPO: AhtishamHussain/devops
        run: |
          set -euo pipefail

          if [ -z "${PROJECT_REPO_TOKEN}" ]; then
            echo "::error::The PROJECT_REPO_TOKEN secret is not set on this repository." \
                 "Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          status="$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PROJECT_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DEVOPS_REPO}/dispatches" \
            -d '{"event_type":"pipecat-green","client_payload":{"sha":"${{ github.sha }}"}}')"

          echo "GitHub API responded with HTTP ${status}."
          case "${status}" in
            204)
              echo "Notified ${DEVOPS_REPO}."
              ;;
            401)
              echo "::error::PROJECT_REPO_TOKEN was rejected (HTTP 401, bad credentials)." \
                   "The token is expired or invalid. Generate a new PAT with access to" \
                   "${DEVOPS_REPO} and update the PROJECT_REPO_TOKEN secret."
              exit 1
              ;;
            404)
              echo "::error::${DEVOPS_REPO} not found (HTTP 404). Either the repo does not" \
                   "exist or PROJECT_REPO_TOKEN has no access to it. For a fine-grained PAT," \
                   "grant it that repo with 'Contents: Read and write'; for a classic PAT," \
                   "use the 'repo' scope."
              exit 1
              ;;
            *)
              echo "::error::Dispatch to ${DEVOPS_REPO} failed (HTTP ${status})."
              exit 1
              ;;
          esac
