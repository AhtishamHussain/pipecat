name: notify-devops

# On push to main (or manual run), signal AhtishamHussain/devops to build the
# image (Harbor), then deploy to the private Kubernetes cluster via
# Terraform / Ansible / ArgoCD. All deploy work lives in the devops repo.

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify-devops:
    name: Notify devops repo
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to devops
        env:
          PROJECT_REPO_TOKEN: ${{ secrets.PROJECT_REPO_TOKEN }}
          DEVOPS_REPO: AhtishamHussain/devops
        run: |
          set -euo pipefail

          if [ -z "${PROJECT_REPO_TOKEN}" ]; then
            echo "::error::The PROJECT_REPO_TOKEN secret is not set on this repository." \
                 "Add it under Settings > Secrets and variables > Actions."
            exit 1
          fi

          short_sha="$(echo '${{ github.sha }}' | cut -c1-7)"
          payload="$(jq -nc \
            --arg event_type "pipecat-deploy" \
            --arg sha "${{ github.sha }}" \
            --arg short_sha "${short_sha}" \
            --arg ref "${{ github.ref_name }}" \
            --arg repo "${{ github.repository }}" \
            --arg actor "${{ github.actor }}" \
            '{
              event_type: $event_type,
              client_payload: {
                sha: $sha,
                short_sha: $short_sha,
                ref: $ref,
                repo: $repo,
                actor: $actor,
                image_tag: $short_sha
              }
            }')"

          status="$(curl --silent --show-error --output /dev/null \
            --write-out '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${PROJECT_REPO_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${DEVOPS_REPO}/dispatches" \
            -d "${payload}")"

          echo "GitHub API responded with HTTP ${status}."
          case "${status}" in
            204)
              echo "Notified ${DEVOPS_REPO} (pipecat-deploy, sha=${{ github.sha }})."
              ;;
            401)
              echo "::error::PROJECT_REPO_TOKEN was rejected (HTTP 401, bad credentials)." \
                   "The token is expired or invalid. Generate a new classic PAT with" \
                   "'repo' + 'workflow' scopes and access to ${DEVOPS_REPO}, then update" \
                   "the PROJECT_REPO_TOKEN secret."
              exit 1
              ;;
            404)
              echo "::error::${DEVOPS_REPO} not found (HTTP 404). Either the repo does not" \
                   "exist or PROJECT_REPO_TOKEN has no access to it. Classic PAT needs" \
                   "the 'repo' scope."
              exit 1
              ;;
            *)
              echo "::error::Dispatch to ${DEVOPS_REPO} failed (HTTP ${status})."
              exit 1
              ;;
          esac
